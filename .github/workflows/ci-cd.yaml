
name : django CI Cd
on : 
  push: 
     branches: 
           -main
  pull_request:
     branches:
          -main
           
jobs:
  test:
    runs_on: ubuntu-latest
    steps:
      - name: cloner le projet
      uses : actions/checkoutv@4
      -name: installation de python
      uses : actions/setup-python
      with:
         python-version: "3.12"
      -name: update de gestion de package   
      run: pip install --upgrade
      -name : installer les dependances
      run: pip install -r requirements.txt
      -name : lancer la teste
      run: python manage.py test
      
      
      
    
     
